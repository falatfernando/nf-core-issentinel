repository_type: pipeline

nf_core_version: 4.0.2

lint:
  files_unchanged:
    - assets/sendmail_template.txt
  multiqc_config: false
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - assets/multiqc_config.yml

template:
  org: nf-core
  name: issentinel
  description: Insertion Sequence Variants Detection Pipeline.
  author: Fernando Falat
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - igenomes
    - multiqc
    - fastqc
    - gpu
  is_nfcore: true
